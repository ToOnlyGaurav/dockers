# =============================================================================
# Aerospike Multi-Site Strong-Consistency Cluster - Docker Compose
# =============================================================================
#
# Topology:
#   Site 1 (Rack 1): site1-node1  172.28.0.11
#                     site1-node2  172.28.0.12
#                     site1-node3  172.28.0.13
#
#   Site 2 (Rack 2): site2-node1  172.28.0.21
#                     site2-node2  172.28.0.22
#                     site2-node3  172.28.0.23
#
#   Quorum (Rack 3):  quorum-node  172.28.0.31   (tie-breaker)
#
# Network: 172.28.0.0/24 - single bridge, all nodes mesh to all nodes.
# SC mode: replication-factor=3, active-rack=1, min-cluster-size=4 (prevents split-brain).
# Masters are pinned to Site 1 (Rack 1); quorum node is quiesced (pure tie-breaker).
# =============================================================================

x-common-env: &common-env
  MESH_SEEDS: >-
    172.28.0.11:3002,172.28.0.12:3002,172.28.0.13:3002,172.28.0.21:3002,172.28.0.22:3002,172.28.0.23:3002,172.28.0.31:3002

x-common-healthcheck: &common-healthcheck
  test: ["CMD", "asinfo", "-v", "status", "-h", "127.0.0.1", "-p", "3000"]
  interval: 10s
  timeout: 5s
  retries: 10
  start_period: 30s

x-common-settings: &common-settings
  build:
    context: .
    dockerfile: Dockerfile
    args:
      # Allow override via shell env, default to linux/arm64
      PLATFORM: ${PLATFORM:-linux/arm64}
  image: myubuntu-noble_aerospike-multisite
  restart: unless-stopped
  # Use cap_add instead of privileged for least-privilege security.
  # NET_ADMIN is only needed for iptables-based partition simulation.
  cap_add:
    - NET_ADMIN
  stdin_open: true
  tty: true
  command: ["asd"]
  healthcheck:
    <<: *common-healthcheck
  networks:
    - as-multisite

services:
  # ===========================================================================
  # Site 1 / Rack 1  (3 nodes)
  # ===========================================================================
  site1-node1:
    <<: *common-settings
    container_name: site1-node1
    hostname: site1-node1
    environment:
      <<: *common-env
      NODE_ID: A1
      RACK_ID: "1"
      SERVICE_ADDRESS: 172.28.0.11
    volumes:
      - site1_node1_data:/etc/aerospike/data
      - site1_node1_smd:/etc/aerospike/smd
      - site1_node1_log:/etc/aerospike/log
    ports:
      - "3000:3000"   # service
      - "3001:3001"   # fabric
      - "3002:3002"   # heartbeat
      - "3003:3003"   # info
    networks:
      as-multisite:
        ipv4_address: 172.28.0.11

  site1-node2:
    <<: *common-settings
    container_name: site1-node2
    hostname: site1-node2
    depends_on:
      site1-node1:
        condition: service_started
    environment:
      <<: *common-env
      NODE_ID: A2
      RACK_ID: "1"
      SERVICE_ADDRESS: 172.28.0.12
    volumes:
      - site1_node2_data:/etc/aerospike/data
      - site1_node2_smd:/etc/aerospike/smd
      - site1_node2_log:/etc/aerospike/log
    ports:
      - "3100:3000"
      - "3101:3001"
      - "3102:3002"
      - "3103:3003"
    networks:
      as-multisite:
        ipv4_address: 172.28.0.12

  site1-node3:
    <<: *common-settings
    container_name: site1-node3
    hostname: site1-node3
    depends_on:
      site1-node1:
        condition: service_started
    environment:
      <<: *common-env
      NODE_ID: A3
      RACK_ID: "1"
      SERVICE_ADDRESS: 172.28.0.13
    volumes:
      - site1_node3_data:/etc/aerospike/data
      - site1_node3_smd:/etc/aerospike/smd
      - site1_node3_log:/etc/aerospike/log
    ports:
      - "3200:3000"
      - "3201:3001"
      - "3202:3002"
      - "3203:3003"
    networks:
      as-multisite:
        ipv4_address: 172.28.0.13

  # ===========================================================================
  # Site 2 / Rack 2  (3 nodes)
  # ===========================================================================
  site2-node1:
    <<: *common-settings
    container_name: site2-node1
    hostname: site2-node1
    depends_on:
      site1-node1:
        condition: service_started
    environment:
      <<: *common-env
      NODE_ID: B1
      RACK_ID: "2"
      SERVICE_ADDRESS: 172.28.0.21
    volumes:
      - site2_node1_data:/etc/aerospike/data
      - site2_node1_smd:/etc/aerospike/smd
      - site2_node1_log:/etc/aerospike/log
    ports:
      - "3300:3000"
      - "3301:3001"
      - "3302:3002"
      - "3303:3003"
    networks:
      as-multisite:
        ipv4_address: 172.28.0.21

  site2-node2:
    <<: *common-settings
    container_name: site2-node2
    hostname: site2-node2
    depends_on:
      site2-node1:
        condition: service_started
    environment:
      <<: *common-env
      NODE_ID: B2
      RACK_ID: "2"
      SERVICE_ADDRESS: 172.28.0.22
    volumes:
      - site2_node2_data:/etc/aerospike/data
      - site2_node2_smd:/etc/aerospike/smd
      - site2_node2_log:/etc/aerospike/log
    ports:
      - "3400:3000"
      - "3401:3001"
      - "3402:3002"
      - "3403:3003"
    networks:
      as-multisite:
        ipv4_address: 172.28.0.22

  site2-node3:
    <<: *common-settings
    container_name: site2-node3
    hostname: site2-node3
    depends_on:
      site2-node1:
        condition: service_started
    environment:
      <<: *common-env
      NODE_ID: B3
      RACK_ID: "2"
      SERVICE_ADDRESS: 172.28.0.23
    volumes:
      - site2_node3_data:/etc/aerospike/data
      - site2_node3_smd:/etc/aerospike/smd
      - site2_node3_log:/etc/aerospike/log
    ports:
      - "3500:3000"
      - "3501:3001"
      - "3502:3002"
      - "3503:3003"
    networks:
      as-multisite:
        ipv4_address: 172.28.0.23

  # ===========================================================================
  # Quorum / Rack 3  (1 tie-breaker node)
  # ===========================================================================
  quorum-node:
    <<: *common-settings
    container_name: quorum-node
    hostname: quorum-node
    depends_on:
      site1-node1:
        condition: service_started
      site2-node1:
        condition: service_started
    environment:
      <<: *common-env
      NODE_ID: C1
      RACK_ID: "3"
      SERVICE_ADDRESS: 172.28.0.31
    volumes:
      - quorum_node_data:/etc/aerospike/data
      - quorum_node_smd:/etc/aerospike/smd
      - quorum_node_log:/etc/aerospike/log
    ports:
      - "3600:3000"
      - "3601:3001"
      - "3602:3002"
      - "3603:3003"
    networks:
      as-multisite:
        ipv4_address: 172.28.0.31

# =============================================================================
# Volumes - persistent storage for each node
# =============================================================================
volumes:
  site1_node1_data:
    name: ms_site1_node1_data
  site1_node1_smd:
    name: ms_site1_node1_smd
  site1_node1_log:
    name: ms_site1_node1_log
  site1_node2_data:
    name: ms_site1_node2_data
  site1_node2_smd:
    name: ms_site1_node2_smd
  site1_node2_log:
    name: ms_site1_node2_log
  site1_node3_data:
    name: ms_site1_node3_data
  site1_node3_smd:
    name: ms_site1_node3_smd
  site1_node3_log:
    name: ms_site1_node3_log
  site2_node1_data:
    name: ms_site2_node1_data
  site2_node1_smd:
    name: ms_site2_node1_smd
  site2_node1_log:
    name: ms_site2_node1_log
  site2_node2_data:
    name: ms_site2_node2_data
  site2_node2_smd:
    name: ms_site2_node2_smd
  site2_node2_log:
    name: ms_site2_node2_log
  site2_node3_data:
    name: ms_site2_node3_data
  site2_node3_smd:
    name: ms_site2_node3_smd
  site2_node3_log:
    name: ms_site2_node3_log
  quorum_node_data:
    name: ms_quorum_node_data
  quorum_node_smd:
    name: ms_quorum_node_smd
  quorum_node_log:
    name: ms_quorum_node_log

# =============================================================================
# Network - single bridge with a /24 subnet for static IP assignments
# =============================================================================
networks:
  as-multisite:
    name: as-multisite
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
          gateway: 172.28.0.1
